<script>
// === CONFIG ===
const SURL = 'https://syvpccbceajxzrhqumks.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dnBjY2JjZWFqeHpyaHF1bWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTM5MTcsImV4cCI6MjA4ODcyOTkxN30.3nwWP0EtG9Vl-ZSPJlY4C7k2oGl-zUYIZjWAmvvFDmg';
const db = supabase.createClient(SURL, SKEY);

// === STATE ===
let sports = [];
let currentSport = null;
let players = [], sessions = [], attendance = [], circusRecords = [], circusHistory = [], strikeResets = [];

let rSort = { col: 'name', dir: 1 };
let sessFilter = 'all';
let sessSortCol = {};

// Sport accent colors
const SPORT_COLORS = ['#00e676', '#ffab00', '#29b6f6', '#f06292', '#26c6da', '#ce93d8'];

function getSportColor(idx) {
  return SPORT_COLORS[idx % SPORT_COLORS.length];
}

function applySportTheme(sport) {
  if (!sport) return;
  const idx = sports.findIndex(s => s.id === sport.id);
  const color = getSportColor(idx);
  document.documentElement.style.setProperty('--sport-accent', color);
  
  document.getElementById('app-title').innerHTML = 
    (sport.emoji || '') + ' ' + sport.name + ' Attendance';
  
  document.getElementById('tab-circus').classList.toggle('hidden', !sport.has_circus);
  
  document.getElementById('season-sport-name').textContent = (sport.emoji || '') + sport.name;
}

// === INIT ===
async function init() {
  try {
    setStatus('● Loading sports...', 'var(--amber)');
    
    const { data: sp, error } = await db.from('sports').select('*').order('sort_order');
    
    if (error || !sp) {
      document.getElementById('setup-modal').classList.add('open');
      return;
    }
    
    sports = sp || [];
    if (sports.length === 0) {
      document.getElementById('setup-modal').classList.add('open');
      return;
    }
    
    renderSportBar();
    await selectSport(sports[0]);
  } catch (e) {
    console.error(e);
    setStatus('● Error loading', 'var(--red)');
  }
}

async function selectSport(sport) {
  currentSport = sport;
  applySportTheme(sport);
  renderSportBar();
  await loadSportData(sport.id);
}

async function loadSportData(sportId) {
  try {
    setStatus('● Loading data...', 'var(--amber)');

    // Players
    const { data: p } = await db.from('players').select('*').eq('sport_id', sportId).order('name');
    players = p || [];

    // Sessions
    const { data: s } = await db.from('practices').select('*').eq('sport_id', sportId).order('date', { ascending: false });
    sessions = s || [];

    // Attendance
    const sessIds = sessions.map(ss => ss.id);
    let a = [];
    if (sessIds.length) {
      const { data } = await db.from('attendance').select('*').in('practice_id', sessIds);
      a = data || [];
    }
    attendance = a;

    // Circus (only if enabled)
    if (currentSport?.has_circus) {
      const { data: c } = await db.from('circus').select('*').eq('sport_id', sportId);
      const { data: ch } = await db.from('circus_history').select('*').eq('sport_id', sportId);
      circusRecords = c || [];
      circusHistory = ch || [];
    } else {
      circusRecords = [];
      circusHistory = [];
    }

    const { data: sr } = await db.from('strike_resets').select('*').eq('sport_id', sportId);
    strikeResets = sr || [];

    setStatus('● Connected to ' + currentSport.name, 'var(--green)');
    
    refreshPosFilter();
    renderRoster();
    renderSessions();
    renderReports();
    if (currentSport.has_circus) renderCircus();
    
    document.getElementById('s-date').valueAsDate = new Date();
  } catch (e) {
    setStatus('● Load error', 'var(--red)');
    console.error(e);
  }
}

// Keep the rest of your functions (renderSportBar, addSport, deleteSport, etc.) 
// but I can clean them up further if you want.

init();
</script>
