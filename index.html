<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Attendance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green:#00e676; --red:#ff1744; --amber:#ffab00; --blue:#29b6f6;
  --purple:#ce93d8; --orange:#ff7043; --teal:#26c6da;
  --bg:#0d0d0d; --surface:#161616; --surface2:#1c1c1c;
  --border:#2a2a2a; --text:#f0f0f0; --muted:#666;
  --sport-accent: var(--green);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* header */
header{border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px;background:var(--surface);}
header h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--sport-accent);}
#status{font-size:12px;color:var(--muted);margin-left:auto;}
/* ── SPORT BAR ── */
.sport-bar{background:#111;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;}
.sport-bar::-webkit-scrollbar{display:none;}
.sport-btn{padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit;}
.sport-btn:hover{color:var(--text);}
.sport-btn.active{color:var(--sport-accent);border-bottom-color:var(--sport-accent);}
.sport-btn .sport-emoji{margin-right:6px;font-size:14px;}
.sport-mgr-btn{margin-left:auto;padding:6px 12px;font-size:11px;font-weight:600;letter-spacing:.6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:5px;font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.sport-mgr-btn:hover{color:var(--text);border-color:#555;}
/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 28px;}
.tab{padding:13px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.8px;text-transform:uppercase;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--sport-accent);border-bottom-color:var(--sport-accent);}
.tab.circus-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab.hidden{display:none;}
/* layout */
.container{padding:28px;max-width:1020px;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
/* form controls */
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
input[type="text"],input[type="date"],select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--sport-accent);}
select option{background:#1a1a1a;}
.grow{flex:1;min-width:140px;}
/* buttons */
button{padding:9px 16px;border-radius:6px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn-g{background:var(--sport-accent);color:#000;}
.btn-g:hover{opacity:.85;}
.btn-gh{background:var(--border);color:var(--text);}
.btn-gh:hover{background:#333;}
.btn-del{background:transparent;color:var(--red);border:1px solid #2a0a0a;font-size:11px;padding:5px 9px;}
.btn-del:hover{background:#1a0505;}
.btn-edit{background:transparent;color:var(--amber);border:1px solid #2a1a00;font-size:11px;padding:5px 9px;}
.btn-edit:hover{background:#1a1000;}
.btn-orange{background:var(--orange);color:#000;}
.btn-orange:hover{opacity:.85;}
/* pills */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;letter-spacing:.4px;transition:all .12s;}
.pill:hover{color:var(--text);}
.pill.on{background:#0d2a0d;border-color:var(--green);color:var(--green);}
.pill.am-on{background:#0d1a2a;border-color:var(--blue);color:var(--blue);}
.pill.pm-on{background:#2a1a0d;border-color:var(--amber);color:var(--amber);}
/* table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;}
.tbl th.sort-col{cursor:pointer;}
.tbl th.sort-col:hover{color:var(--text);}
.tbl th.sorted{color:var(--sport-accent);}
.tbl td{padding:10px 12px;border-bottom:1px solid #1a1a1a;font-size:13px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#161616;}
/* badges */
.b{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;}
.bg{background:#0d2a0d;color:var(--green);}
.br{background:#2a0d0d;color:var(--red);}
.ba{background:#2a1a00;color:var(--amber);}
.bi{background:#0d1a2a;color:var(--blue);}
.b-var{background:#1a0a2a;color:#ce93d8;}
.b-jv{background:#0a1a2a;color:#81d4fa;}
.b-fr{background:#0a2a1a;color:#80cbc4;}
.b-am{background:#0d1a2a;color:var(--blue);}
.b-pm{background:#2a1a0d;color:var(--amber);}
.b-strike{background:#2a1500;color:var(--orange);}
.b-manual{background:#1a0a2a;color:var(--purple);}
.b-inactive{background:#1e1e1e;color:var(--muted);}
.b-excused{background:#0d2a1a;color:#80cbc4;}
/* attendance toggle */
.tog{display:flex;border-radius:5px;overflow:hidden;border:1px solid var(--border);width:fit-content;}
.tog button{padding:5px 12px;font-size:11px;border-radius:0;border:none;background:transparent;color:var(--muted);transition:all .1s;font-family:inherit;font-weight:600;cursor:pointer;}
.tog button.on-p{background:#0d2a0d;color:var(--green);}
.tog button.on-a{background:#2a0d0d;color:var(--red);}
.tog button.on-t{background:#2a1a00;color:var(--amber);}
.tog button.on-i{background:#0d1a2a;color:var(--blue);}
.tog button.on-e{background:#0d2a1a;color:var(--green);}
/* session cards */
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.s-head{padding:13px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;flex-wrap:wrap;}
.s-head:hover{background:var(--surface2);}
.s-date{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;}
.s-body{display:none;border-top:1px solid var(--border);overflow-x:auto;}
.s-body.open{display:block;}
/* mark all bar */
.mark-all-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.mark-all-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);white-space:nowrap;}
.btn-mark{padding:5px 12px;border-radius:5px;border:1px solid transparent;background:transparent;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;letter-spacing:.3px;}
.btn-mark.m-p{color:var(--green);border-color:#1e3a1e;} .btn-mark.m-p:hover{background:#0d2a0d;border-color:var(--green);}
.btn-mark.m-a{color:var(--red);border-color:#3a1e1e;} .btn-mark.m-a:hover{background:#2a0d0d;border-color:var(--red);}
.btn-mark.m-t{color:var(--amber);border-color:#3a2e1e;} .btn-mark.m-t:hover{background:#2a1a00;border-color:var(--amber);}
.btn-mark.m-i{color:var(--blue);border-color:#1e2a3a;} .btn-mark.m-i:hover{background:#0d1a2a;border-color:var(--blue);}
.btn-mark.m-e{color:#80cbc4;border-color:#1e3a2e;} .btn-mark.m-e:hover{background:#0d2a1a;border-color:#80cbc4;}
.sess-sort-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sess-sort-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;}
.sess-sort-wrap select{padding:5px 9px;font-size:11px;border-radius:5px;}
/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.bar-wrap{display:flex;align-items:center;gap:8px;}
.bar-bg{flex:1;height:5px;background:#1e1e1e;border-radius:3px;overflow:hidden;min-width:50px;}
.bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s;}
.bar-pct{font-size:12px;color:var(--muted);width:32px;text-align:right;}
/* makeup dots */
.makeup-dots{display:flex;gap:5px;align-items:center;}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;flex-shrink:0;}
.dot.filled{background:var(--orange);border-color:var(--orange);}
.dot:hover{border-color:var(--orange);}
.strike-meter{display:flex;gap:4px;align-items:center;}
.strike-pip{width:10px;height:10px;border-radius:50%;background:#1e1e1e;border:1px solid var(--border);}
.strike-pip.active{background:var(--orange);}
.strike-pip.danger{background:var(--red);}
/* circus */
.circus-banner{background:linear-gradient(135deg,#1a0800 0%,#2a1200 100%);border:1px solid #3a1800;border-radius:10px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.circus-banner-icon{font-size:28px;}
.circus-banner-text h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--orange);}
.circus-banner-text p{font-size:12px;color:var(--muted);margin-top:3px;}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:3px;}
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;}
.chip-a{background:#2a0d0d;color:#ff6b6b;}
.chip-t{background:#2a1a00;color:var(--amber);}
.chip-i{background:#0d1a2a;color:var(--blue);}
.chip-e{background:#0d2a1a;color:#80cbc4;}
/* modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:20px;color:var(--sport-accent);}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;}
.mf input,.mf select{width:100%;}
.m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
/* sport manager */
.sport-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
.sport-list-emoji{font-size:20px;width:28px;text-align:center;}
.sport-list-name{flex:1;font-weight:600;font-size:14px;}
.sport-list-football-badge{font-size:10px;color:var(--orange);background:#2a1500;padding:2px 7px;border-radius:10px;font-weight:700;}
.sport-add-row{display:flex;gap:8px;margin-top:12px;}
.sport-emoji-input{width:60px;text-align:center;font-size:18px;}
/* misc */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--border);padding:11px 16px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:none;}
code{background:#1e1e1e;padding:1px 5px;border-radius:3px;font-size:11px;}
.hint{font-size:11px;color:var(--muted);margin-bottom:14px;margin-top:-10px;}
.modal.circus-modal h2{color:var(--orange);}
.rpt-dates-col{min-width:160px;}
@media(max-width:600px){
  header{padding:12px 16px;}header h1{font-size:20px;}
  .sport-bar{padding:0 10px;}
  .tabs{padding:0 8px;overflow-x:auto;}
  .tab{padding:11px 12px;font-size:11px;white-space:nowrap;}
  .container{padding:16px;}
  .tbl{font-size:12px;}.tbl th,.tbl td{padding:8px 8px;}
  .hide-mobile{display:none;}
  .s-head{gap:6px;padding:11px 12px;}.s-date{font-size:14px;}
  .tog button{padding:7px 9px;font-size:12px;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .modal{padding:20px 16px;}.mf input,.mf select{font-size:16px;}
  input[type="text"],input[type="date"],select{font-size:16px;}
  .mark-all-bar{gap:5px;}.sess-sort-wrap{margin-left:0;width:100%;}
}
</style>
</head>
