<script>
// --- CONFIG ---
const SURL='https://syvpccbceajxzrhqumks.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dnBjY2JjZWFqeHpyaHF1bWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTM5MTcsImV4cCI6MjA4ODcyOTkxN30.3nwWP0EtG9Vl-ZSPJlY4C7k2oGl-zUYIZjWAmvvFDmg';
const db=supabase.createClient(SURL,SKEY);

let currentSport = 'Football';
let players=[], sessions=[], attendance=[], circusRecords=[], circusHistory=[], strikeResets=[];

// --- MULTISPORT SWITCHER ---
async function changeSport() {
    currentSport = document.getElementById('active-sport').value;
    const root = document.querySelector(':root');
    const colors = { 'Football': '#00e676', 'Basketball': '#ffab00', 'Baseball': '#29b6f6', 'Soccer': '#ce93d8' };
    const color = colors[currentSport] || '#00e676';
    root.style.setProperty('--green', color);
    document.getElementById('active-sport').style.color = color;
    await init();
}

async function init(){
  try {
    setStatus(`● Loading ${currentSport}...`,'var(--amber)');
    
    // FETCH DATA FILTERED BY SPORT
    const p = await db.from('players').select('*').eq('sport', currentSport).order('name');
    players = p.data || [];

    const s = await db.from('practices').select('*').eq('sport', currentSport).order('date',{ascending:false});
    sessions = s.data || [];

    const a = await db.from('attendance').select('*').eq('sport', currentSport);
    attendance = a.data || [];

    const c = await db.from('circus').select('*').eq('sport', currentSport);
    circusRecords = c.data || [];

    const ch = await db.from('circus_history').select('*').eq('sport', currentSport);
    circusHistory = ch.data || [];

    setStatus(`● ${currentSport} Connected`,'var(--green)');
    renderRoster(); renderSessions(); renderReports(); renderCircus();
    document.getElementById('s-date').valueAsDate = new Date();
  } catch(e) {
    setStatus('● Error: '+e.message, 'var(--red)');
  }
}

// --- CRUD OPS (Updated for Sport) ---

async function savePlayer() {
    const id = document.getElementById('edit-id').value;
    const name = document.getElementById('f-name').value;
    const level = document.getElementById('f-level').value;
    const group = document.getElementById('f-group').value;

    const pData = { name, level, group_name: group, sport: currentSport, active: true };

    if(id) await db.from('players').update(pData).eq('id', id);
    else await db.from('players').insert(pData);

    closeModal();
    toast('Roster Updated');
    init();
}

async function addSession() {
    const date = document.getElementById('s-date').value;
    const time = document.getElementById('s-time').value;
    const group = document.getElementById('s-group').value;
    
    const { data, error } = await db.from('practices').insert({
        date, sport: currentSport, label: `${time}|${group}`
    }).select();

    if(!error) {
        toast('Session Added');
        init();
    }
}

async function updateAttendance(pid, sessId, status) {
    await db.from('attendance').upsert({
        player_id: pid,
        practice_id: sessId,
        status: status,
        sport: currentSport // Log sport on attendance
    }, { onConflict: 'player_id,practice_id' });
    
    // Re-fetch attendance locally to update UI
    const a = await db.from('attendance').select('*').eq('sport', currentSport);
    attendance = a.data;
    renderSessions();
}

// --- UI HELPERS ---

function showPage(name){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function setStatus(t,c){ const el=document.getElementById('status'); el.textContent=t; el.style.color=c; }

function toast(msg){
    const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}

function openAdd(){ 
    document.getElementById('edit-id').value=''; 
    document.getElementById('modal-title').textContent='Add Player';
    document.getElementById('modal').classList.add('open'); 
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }

// --- RENDER LOGIC ---

function renderRoster() {
    const body = document.getElementById('roster-body');
    if(!players.length) { body.innerHTML = '<tr><td colspan="8" class="empty">No players in roster.</td></tr>'; return; }
    
    body.innerHTML = players.map(p => `
        <tr>
            <td><strong>${p.name}</strong></td>
            <td>${p.grade || '-'}</td>
            <td>${p.position || '-'}</td>
            <td>${p.level}</td>
            <td>${p.group_name}</td>
            <td>${getStrikes(p.id)}</td>
            <td><span class="b ${p.active ? 'bg' : 'bi'}">${p.active ? 'Active' : 'Inactive'}</span></td>
            <td><button class="btn-gh" onclick="editPlayer('${p.id}')">Edit</button></td>
        </tr>
    `).join('');
}

function renderSessions() {
    const list = document.getElementById('sess-list');
    if(!sessions.length) { list.innerHTML = '<div class="empty">No sessions.</div>'; return; }

    list.innerHTML = sessions.map(s => `
        <div class="s-card">
            <div class="s-head" onclick="this.nextElementSibling.classList.toggle('open')">
                <span class="s-date">${s.date}</span>
                <span class="b bi">${s.label}</span>
            </div>
            <div class="s-body">
                <table class="tbl">
                    ${players.filter(p => p.group_name === s.label.split('|')[1]).map(p => {
                        const att = attendance.find(a => a.player_id === p.id && a.practice_id === s.id);
                        const stat = att ? att.status : 'pending';
                        return `
                            <tr>
                                <td>${p.name}</td>
                                <td>
                                    <button class="pill ${stat==='present'?'on':''}" onclick="updateAttendance('${p.id}','${s.id}','present')">P</button>
                                    <button class="pill ${stat==='absent'?'on':''}" onclick="updateAttendance('${p.id}','${s.id}','absent')" style="color:var(--red)">A</button>
                                    <button class="pill ${stat==='tardy'?'on':''}" onclick="updateAttendance('${p.id}','${s.id}','tardy')" style="color:var(--amber)">T</button>
                                </td>
                            </tr>
                        `;
                    }).join('')}
                </table>
            </div>
        </div>
    `).join('');
}

function getStrikes(pid) {
    return attendance.filter(a => a.player_id === pid && (a.status === 'absent' || a.status === 'tardy')).length;
}

function renderReports() { /* Standard report logic */ }
function renderCircus() { /* Standard circus logic */ }

window.onload = init;
</script>
</body>
</html> -->

    <button class="btn-g" onclick="addSession()">+ Add Session</button>

<div id="page-roster" class="page container">
  <p class="section-title">Roster</p>
  <div class="row">
    <input type="text" id="r-search" class="grow" placeholder="Search name..." oninput="renderRoster()">
    <button class="btn-g" onclick="openAdd()">+ Add Player</button>
  </div>
  <table class="tbl">
    <thead><tr><th>Name</th><th>Level</th><th>Group</th><th>Strikes</th><th>Status</th><th></th></tr></thead>
    <tbody id="roster-body"></tbody>
  </table>
</div>

<div id="page-circus" class="page container"><p class="section-title">Circus Makeups</p><div id="circus-active-body"></div></div>
<div id="page-reports" class="page container"><p class="section-title">Summary</p><div id="rpt-body"></div></div>

<div class="toast" id="toast"></div>

<script>
const SURL='https://syvpccbceajxzrhqumks.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dnBjY2JjZWFqeHpyaHF1bWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTM5MTcsImV4cCI6MjA4ODcyOTkxN30.3nwWP0EtG9Vl-ZSPJlY4C7k2oGl-zUYIZjWAmvvFDmg';
const db = supabase.createClient(SURL, SKEY);

let players=[], sessions=[], attendance=[];

async function init() {
    const p = await db.from('players').select('*').order('name');
    players = p.data || [];
    const s = await db.from('practices').select('*').order('date', {ascending:false});
    sessions = s.data || [];
    const a = await db.from('attendance').select('*');
    attendance = a.data || [];
    
    document.getElementById('status').textContent = '● Connected';
    document.getElementById('s-date').valueAsDate = new Date();
    renderRoster();
    renderSessions();
}

function renderSessions() {
    const list = document.getElementById('sess-list');
    list.innerHTML = sessions.map(s => {
        const parts = s.label.split('|');
        const group = parts[1] || parts[0];
        const sessionPlayers = players.filter(p => p.group_name === group && p.active !== false);

        return `
        <div class="s-card">
            <div class="s-head" onclick="this.nextElementSibling.classList.toggle('open')">
                <span class="s-date">${s.date}</span>
                <span class="b bg">${s.label}</span>
                <span style="margin-left:auto; font-size:11px; color:var(--muted)">${sessionPlayers.length} Players</span>
            </div>
            <div class="s-body">
                <div class="mark-all-bar">
                    <span class="mark-all-lbl">Mark All:</span>
                    <button class="btn-mark m-p" onclick="markAll('${s.id}', 'present')">PRESENT</button>
                    <button class="btn-mark m-a" onclick="markAll('${s.id}', 'absent')">ABSENT</button>
                    <button class="btn-mark m-t" onclick="markAll('${s.id}', 'tardy')">TARDY</button>
                    <button class="btn-mark m-i" onclick="markAll('${s.id}', 'injured')">INJURED</button>
                    <button class="btn-mark m-e" onclick="markAll('${s.id}', 'excused')">EXCUSED</button>
                </div>
                <table class="tbl">
                    ${sessionPlayers.map(p => {
                        const att = attendance.find(a => a.player_id === p.id && a.practice_id === s.id);
                        const cur = att ? att.status : '';
                        return `
                        <tr>
                            <td>${p.name}</td>
                            <td style="text-align:right">
                                <div class="tog">
                                    <button class="${cur==='present'?'on-p':''}" onclick="setAtt('${p.id}','${s.id}','present')">P</button>
                                    <button class="${cur==='absent'?'on-a':''}" onclick="setAtt('${p.id}','${s.id}','absent')">A</button>
                                    <button class="${cur==='tardy'?'on-t':''}" onclick="setAtt('${p.id}','${s.id}','tardy')">T</button>
                                    <button class="${cur==='injured'?'on-i':''}" onclick="setAtt('${p.id}','${s.id}','injured')">I</button>
                                    <button class="${cur==='excused'?'on-e':''}" onclick="setAtt('${p.id}','${s.id}','excused')">E</button>
                                </div>
                            </td>
                        </tr>`;
                    }).join('')}
                </table>
            </div>
        </div>`;
    }).join('');
}

async function setAtt(pid, sid, status) {
    await db.from('attendance').upsert({ player_id: pid, practice_id: sid, status: status }, { onConflict: 'player_id,practice_id' });
    const a = await db.from('attendance').select('*');
    attendance = a.data;
    renderSessions();
}

async function markAll(sid, status) {
    const s = sessions.find(x => x.id === sid);
    const group = s.label.split('|')[1] || s.label.split('|')[0];
    const targetPlayers = players.filter(p => p.group_name === group && p.active !== false);
    
    const updates = targetPlayers.map(p => ({ player_id: p.id, practice_id: sid, status: status }));
    await db.from('attendance').upsert(updates, { onConflict: 'player_id,practice_id' });
    
    const a = await db.from('attendance').select('*');
    attendance = a.data;
    renderSessions();
    toast(`All marked as ${status.toUpperCase()}`);
}

function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
}

function toast(m){ 
    const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

function renderRoster() {
    const body = document.getElementById('roster-body');
    body.innerHTML = players.map(p => `
        <tr>
            <td><strong>${p.name}</strong></td>
            <td>${p.level}</td>
            <td>${p.group_name}</td>
            <td>0</td>
            <td><span class="b bg">Active</span></td>
            <td></td>
        </tr>
    `).join('');
}

window.onload = init;
</script>
</body>
</html>
