// ====================== SESSION ADD ======================
async function addSession() {
  const date = document.getElementById('s-date').value;
  const type = document.getElementById('s-type').value;        // AM or PM (actual time)
  const forGroup = document.getElementById('s-for-group').value; // forced group
  const notes = document.getElementById('s-notes').value.trim();

  if (!date) {
    toast('Please select a date');
    return;
  }

  // Use forced group if selected, otherwise use normal type
  const sessionLabel = forGroup || type;

  const existing = sessions.find(s => s.date === date && s.label === sessionLabel);
  if (existing) {
    toast('Session already exists — opening it');
    setTimeout(() => {
      const body = document.getElementById('sb-' + existing.id);
      const chev = document.getElementById('chev-' + existing.id);
      if (body) body.classList.add('open');
      if (chev) chev.textContent = '▴';
      body?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 80);
    return;
  }

  const res = await db.from('practices').insert({
    date: date,
    label: sessionLabel,           // determines which group sees it
    session_type: type,            // keeps original time for clarity
    notes: notes || null
  }).select().single();

  if (res.error) {
    toast('Error: ' + res.error.message);
    return;
  }

  sessions.unshift(res.data);
  document.getElementById('s-notes').value = '';

  renderSessions();
  renderReports();
  toast(`${sessionLabel} session added ✓`);
}

// ====================== RENDER SESSIONS ======================
function renderSessions() {
  const openIds = {};
  sessions.forEach(s => {
    const b = document.getElementById('sb-' + s.id);
    if (b && b.classList.contains('open')) openIds[s.id] = true;
  });

  let list = sessFilter === 'all' ? sessions : sessions.filter(s => s.label === sessFilter);

  const el = document.getElementById('sess-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty">No sessions yet.</div>';
    return;
  }

  el.innerHTML = list.map(s => {
    const att = attendance.filter(a => a.practice_id === s.id);
    const nP = att.filter(a => a.status === 'present').length;
    const nA = att.filter(a => a.status === 'absent').length;
    const nT = att.filter(a => a.status === 'tardy').length;
    const nI = att.filter(a => a.status === 'injured').length;
    const nE = att.filter(a => a.status === 'excused').length;

    const isCrossGroup = s.label !== s.session_type;
    const sessionTitle = isCrossGroup 
      ? `${s.session_type} Session <span style="color:var(--amber)">→ ${s.label} Kids</span>`
      : `${s.label} Session`;

    const tc = s.label === 'AM' ? 'b-am' : 'b-pm';

    const sortedP = getSortedPlayers(s.id, s.label);
    const curSort = sessSortCol[s.id] || 'name';

    const sortOpts = ['name','grade','level','position'].map(v => {
      const lbl = v.charAt(0).toUpperCase() + v.slice(1);
      return `<option value="${v}" ${curSort===v?'selected':''}>${lbl}</option>`;
    }).join('');

    const rows = sortedP.map(p => {
      const rec = att.find(a => a.player_id === p.id);
      const status = rec ? rec.status : null;
      return `<tr>
        <td>${esc(p.name)}</td>
        <td>${lvlBadge(p.level)}</td>
        <td class="hide-mobile">${p.grade || dash()}</td>
        <td class="hide-mobile">${p.position || dash()}</td>
        <td>${grpBadge(p.group_name)}</td>
        <td><div class="tog">
          <button class="${status==='present'?'on-p':''}" onclick="setAtt('${s.id}','${p.id}','present')">Present</button>
          <button class="${status==='absent'?'on-a':''}" onclick="setAtt('${s.id}','${p.id}','absent')">Absent</button>
          <button class="${status==='tardy'?'on-t':''}" onclick="setAtt('${s.id}','${p.id}','tardy')">T</button>
          <button class="${status==='injured'?'on-i':''}" onclick="setAtt('${s.id}','${p.id}','injured')">I</button>
          <button class="${status==='excused'?'on-e':''}" onclick="setAtt('${s.id}','${p.id}','excused')">E</button>
        </div></td>
      </tr>`;
    }).join('');

    return `<div class="s-card">
      <div class="s-head" onclick="toggleSess('${s.id}')">
        <span class="b ${tc}">${s.label}</span>
        <span class="s-date">${fmtDate(s.date)}</span>
        <span style="flex:1;font-size:12px;color:var(--muted)">${esc(s.notes||'')}</span>
        <span style="color:var(--muted);font-size:12px;">${sessionTitle}</span>
        <span id="hdr-${s.id}">
          <span class="b bg">${nP} present</span> 
          <span class="b br">${nA} absent</span> 
          ${nT ? `<span class="b ba">${nT} tardy</span> ` : ''}
          ${nI ? `<span class="b bi">${nI} inj</span> ` : ''}
          ${nE ? `<span class="b b-excused">${nE} exc</span>` : ''}
        </span>
        <button class="btn-del" onclick="event.stopPropagation();delSession('${s.id}')">Delete</button>
        <span id="chev-${s.id}" style="font-size:11px;color:var(--muted)">▾</span>
      </div>
      <div class="s-body" id="sb-${s.id}">
        <div class="mark-all-bar" onclick="event.stopPropagation()">
          <span class="mark-all-lbl">Mark All:</span>
          <button class="btn-mark m-p" onclick="markAll('${s.id}','present')">✓ Present</button>
          <button class="btn-mark m-a" onclick="markAll('${s.id}','absent')">✗ Absent</button>
          <button class="btn-mark m-t" onclick="markAll('${s.id}','tardy')">T Tardy</button>
          <button class="btn-mark m-i" onclick="markAll('${s.id}','injured')">I Injured</button>
          <button class="btn-mark m-e" onclick="markAll('${s.id}','excused')">E Excused</button>
          <div class="sess-sort-wrap">
            <span class="sess-sort-lbl">Sort:</span>
            <select onchange="setSessSort('${s.id}',this.value)" onclick="event.stopPropagation()">${sortOpts}</select>
          </div>
        </div>
        <table class="tbl" style="margin:0">
          <thead><tr><th>Name</th><th>Level</th><th class="hide-mobile">Grade</th><th class="hide-mobile">Position</th><th>Group</th><th>Attendance</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="6" class="empty">No players.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  // Re-open previously open cards
  Object.keys(openIds).forEach(id => {
    const body = document.getElementById('sb-' + id);
    const chev = document.getElementById('chev-' + id);
    if (body) body.classList.add('open');
    if (chev) chev.textContent = '▴';
  });
}

// Keep the rest of your functions unchanged (getSortedPlayers, markAll, setAtt, etc.)
// Just make sure getSortedPlayers uses s.label correctly — it already does.

function getSortedPlayers(sessionId, label) {
  const col = sessSortCol[sessionId] || 'name';
  let list = players.filter(p => {
    if (p.active === false || p.active === 'false') return false;
    if (p.group_name && p.group_name !== label) return false;
    return true;
  });

  // sorting logic remains the same...
  list.sort((a, b) => {
    if (col === 'grade') {
      const an = parseFloat(a.grade), bn = parseFloat(b.grade);
      if (!isNaN(an) && !isNaN(bn)) return an - bn;
      return (a.grade || '').localeCompare(b.grade || '');
    }
    if (col === 'level') {
      const o = { Freshman: 1, JV: 2, Varsity: 3 };
      return (o[a.level] || 99) - (o[b.level] || 99);
    }
    const av = (a[col] || '').toString().toLowerCase();
    const bv = (b[col] || '').toString().toLowerCase();
    return av < bv ? -1 : av > bv ? 1 : 0;
  });
  return list;
}
